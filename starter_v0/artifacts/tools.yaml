# starter_v0 — tool declarations (intentionally vague).
# Names and descriptions here are a rough first draft. Routing rules, name->handle
# mapping, arg conventions (news/timeframe/Top), and the send-confirmation boundary
# are NOT spelled out anywhere yet. Your job is to make these declarations + the
# system prompt good enough that the agent routes correctly on the eval.
#
# If you rename a tool, keep the name in sync across:
#   this file  ->  tools/__init__.py (TOOL_FUNCTIONS)  ->  data/eval_base.json + data/eval_research_extension.json
tools:
  # ---------------- Core tools ----------------
  - name: clarify
    description: "Gửi một câu hỏi cho người dùng."
    parameters:
      type: object
      properties:
        question: {type: string, default: "", description: "Câu hỏi"}
        response_type: {type: string, enum: [text, yes_no, choice], default: "text", description: "Kiểu trả lời"}
        options: {type: array, default: [], items: {type: string}, description: "Các lựa chọn"}
      required: [question]

  - name: timeline
    description: "Lấy các bài đăng gần đây."
    parameters:
      type: object
      properties:
        screenname: {type: string, default: "", description: "Tên tài khoản"}
        limit: {type: integer, default: 5, description: "Số lượng"}
      required: [screenname]

  - name: social_search
    description: "Tìm trên mạng xã hội."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Từ khóa"}
        search_type: {type: string, enum: [Latest, Top], default: "Latest", description: "Cách sắp xếp"}
        limit: {type: integer, default: 5, description: "Số lượng"}
      required: [query]

  - name: lookup
    description: "Tra cứu thông tin trên internet."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Truy vấn"}
        topic: {type: string, enum: [general, news], default: "general", description: "Phân loại"}
        timeframe: {type: string, enum: [day, week, month, year], default: "week", description: "Khoảng thời gian"}
        max_results: {type: integer, default: 5, description: "Số kết quả"}
      required: [query]

  - name: fetch
    description: "Lấy nội dung từ một địa chỉ."
    parameters:
      type: object
      properties:
        url: {type: string, default: "", description: "Địa chỉ"}
      required: [url]

  - name: format
    description: "Trình bày dữ liệu đã có thành văn bản."
    parameters:
      type: object
      properties:
        items:
          type: array
          default: []
          description: "Danh sách item"
          items:
            type: object
            properties:
              title: {type: string}
              url: {type: string}
              source: {type: string}
              summary: {type: string}
              section: {type: string}
        template: {type: string, enum: [brief, sections, bullets, thread, daily_ai_vn], default: "sections", description: "Khuôn"}
        headline: {type: string, default: "", description: "Tiêu đề"}
      required: [items, template]

  # ---------------- Bonus tools ----------------
  - name: send
    description: "Gửi một đoạn văn bản đi."
    parameters:
      type: object
      properties:
        text: {type: string, default: "", description: "Nội dung"}
        confirmed: {type: boolean, default: false, description: "Cờ xác nhận"}
      required: [text]

  - name: policy
    description: "Tìm trong tài liệu nội bộ."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Truy vấn"}
        policy_area: {type: string, enum: [all, ai_research, source_citation, data_privacy, external_publishing, tool_usage], default: "all", description: "Nhóm"}
        top_k: {type: integer, default: 3, description: "Số mục"}
      required: [query]

  - name: papers
    description: "Tìm bài báo khoa học."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Từ khóa"}
        max_results: {type: integer, default: 5, description: "Số lượng"}
        sort_by: {type: string, enum: [relevance, lastUpdatedDate, submittedDate], default: "relevance", description: "Sắp xếp"}
      required: [query]

  - name: paper_text
    description: "Lấy nội dung text của một bài báo."
    parameters:
      type: object
      properties:
        arxiv_url: {type: string, default: "", description: "ID hoặc địa chỉ"}
        max_pages: {type: integer, default: 5, description: "Số trang"}
        max_chars: {type: integer, default: 8000, description: "Số ký tự"}
      required: [arxiv_url]

  # ---------------- Team local tools ----------------
  - name: extract_keywords
    description: "Tool local phụ trợ để trích keyword từ text. Chỉ dùng khi user yêu cầu keyword/chủ đề rõ ràng; không dùng như bước bắt buộc trước lookup hoặc social_search."
    parameters:
      type: object
      properties:
        text: {type: string, default: "", description: "Query hoặc đoạn text cần trích keyword"}
        max_keywords: {type: integer, default: 5, description: "Số keyword tối đa"}
      required: [text]

  - name: date_normalize
    description: "Tool local phụ trợ để chuẩn hóa cụm thời gian thành day/week/month/year và khoảng ngày. Chỉ dùng khi user hỏi chuẩn hóa thời gian; với request tin tức thì truyền timeframe trực tiếp cho lookup."
    parameters:
      type: object
      properties:
        text: {type: string, default: "", description: "Cụm thời gian hoặc câu có chứa thời gian"}
        reference_date: {type: string, default: "", description: "Ngày mốc dạng YYYY-MM-DD, bỏ trống để dùng ngày hiện tại"}
      required: [text]

  - name: citation_check
    description: "Tool local phụ trợ để kiểm tra item research đã có đủ title, url/source và summary. Chỉ dùng sau khi đã có items hoặc khi user yêu cầu kiểm tra citation."
    parameters:
      type: object
      properties:
        items:
          type: array
          default: []
          description: "Danh sách item research cần kiểm tra citation"
          items:
            type: object
            properties:
              title: {type: string}
              url: {type: string}
              source: {type: string}
              summary: {type: string}
      required: [items]

  - name: source_rank
    description: "Tool local phụ trợ để xếp hạng các item research đã có theo chất lượng nguồn. Chỉ dùng sau khi đã có items hoặc khi user yêu cầu rank nguồn; không fetch dữ liệu mới."
    parameters:
      type: object
      properties:
        items:
          type: array
          default: []
          description: "Danh sách item research cần xếp hạng"
          items:
            type: object
            properties:
              title: {type: string}
              url: {type: string}
              source: {type: string}
              summary: {type: string}
              published: {type: string}
              date: {type: string}
        max_items: {type: integer, default: 5, description: "Số item trả về tối đa"}
      required: [items]
